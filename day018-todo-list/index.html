<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODOリスト</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #2c3038;
    --sub: #7a8290;
    --accent: #4f7cff;
    --border: #e3e6eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
      "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 40px 20px 60px; }
  h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 4px; }
  .lead { color: var(--sub); font-size: 0.9rem; margin: 0 0 24px; }

  .add { display: flex; gap: 10px; margin-bottom: 18px; }
  .add input {
    flex: 1; padding: 13px 15px; border: 1px solid var(--border); border-radius: 11px;
    font-size: 1rem; font-family: inherit; outline: none;
  }
  .add input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,124,255,.15); }
  .add button {
    border: none; background: var(--accent); color: #fff; border-radius: 11px; padding: 0 22px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .add button:hover { opacity: .92; }

  .filters { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .filters button {
    border: 1px solid var(--border); background: #fff; color: var(--sub); border-radius: 999px;
    padding: 6px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .filters button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filters .count { margin-left: auto; font-size: 0.82rem; color: var(--sub); }

  ul.list { list-style: none; margin: 0; padding: 0; }
  ul.list li {
    display: flex; align-items: center; gap: 12px; background: var(--card);
    border: 1px solid var(--border); border-radius: 11px; padding: 12px 14px; margin-bottom: 8px;
  }
  ul.list li .chk {
    width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%;
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: #fff;
  }
  ul.list li.done .chk { background: #1d8a4f; border-color: #1d8a4f; }
  ul.list li .txt { flex: 1; word-break: break-word; }
  ul.list li.done .txt { text-decoration: line-through; color: var(--sub); }
  ul.list li .del {
    border: none; background: none; color: var(--sub); cursor: pointer; font-size: 1.1rem; padding: 2px 6px;
  }
  ul.list li .del:hover { color: #c0392b; }
  .empty { text-align: center; color: var(--sub); padding: 30px 0; }

  .foot-actions { margin-top: 14px; text-align: right; }
  .foot-actions button {
    border: none; background: none; color: var(--sub); cursor: pointer; font-size: 0.82rem; font-family: inherit;
    text-decoration: underline;
  }
  .foot-actions button:hover { color: #c0392b; }
  footer { margin-top: 24px; text-align: center; color: var(--sub); font-size: 0.8rem; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>TODOリスト</h1>
    <p class="lead">やることを書いて管理します。閉じても消えず、このブラウザに保存されます（ネット通信なし）。</p>

    <div class="add">
      <input type="text" id="input" placeholder="やることを入力してEnter" maxlength="200">
      <button id="addBtn">追加</button>
    </div>

    <div class="filters">
      <button data-filter="all" class="active">すべて</button>
      <button data-filter="active">未完了</button>
      <button data-filter="done">完了</button>
      <span class="count" id="count"></span>
    </div>

    <ul class="list" id="list"></ul>
    <div class="empty" id="empty" style="display:none;"></div>

    <div class="foot-actions">
      <button id="clearDone">完了したものを削除</button>
    </div>

    <footer>Day 18 / 100 — TODO List</footer>
  </div>

<script>
  const el = id => document.getElementById(id);
  const STORAGE_KEY = 'day018-todos';

  let todos = load();   // { id, text, done } の配列
  let filter = 'all';   // all / active / done
  let saveFailed = false;

  // 重ならない文字列のIDを作る（識別子は文字列で扱うのが安全）
  function newId() {
    try { return crypto.randomUUID(); }
    catch { return Date.now().toString(36) + '-' + Math.floor(Math.random() * 1e9).toString(36); }
  }

  // ---- 保存・読み込み ----
  function save() {
    // 容量超過やプライベートモードで保存に失敗しても、操作自体は止めない
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); saveFailed = false; }
    catch { saveFailed = true; }
  }
  function load() {
    try {
      const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!Array.isArray(parsed)) return [];
      // 壊れたデータが混ざっても落ちないよう、整えてから通す（ID再採番・長さ制限・空除外）
      return parsed
        .filter(t => t && typeof t.text === 'string')
        .map(t => ({ id: newId(), text: t.text.trim().slice(0, 200), done: !!t.done }))
        .filter(t => t.text !== '');
    } catch { return []; }
  }

  // ---- 操作 ----
  function addTodo(text) {
    const t = text.trim().slice(0, 200);
    if (!t) return;
    todos.unshift({ id: newId(), text: t, done: false });
    save(); render();
  }
  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }
  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    save(); render();
  }
  function clearDone() {
    todos = todos.filter(t => !t.done);
    save(); render();
  }

  // ---- 表示 ----
  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function render() {
    // フィルターで絞り込む
    const shown = todos.filter(t =>
      filter === 'all' ? true : filter === 'active' ? !t.done : t.done);

    const list = el('list');
    list.innerHTML = '';
    shown.forEach(t => {
      const li = document.createElement('li');
      if (t.done) li.className = 'done';
      li.innerHTML = `
        <div class="chk" data-id="${t.id}">${t.done ? '✓' : ''}</div>
        <div class="txt">${escapeHtml(t.text)}</div>
        <button class="del" data-id="${t.id}" title="削除">×</button>`;
      list.appendChild(li);
    });

    // 空のときの案内
    const emptyMsg = todos.length === 0
      ? 'まだ何もありません。上の欄から追加しましょう。'
      : (shown.length === 0 ? 'このフィルターに当てはまるものはありません。' : '');
    el('empty').style.display = emptyMsg ? 'block' : 'none';
    el('empty').textContent = emptyMsg;

    // 残りの未完了数（保存に失敗していれば注意も出す）
    const remain = todos.filter(t => !t.done).length;
    el('count').textContent = `未完了 ${remain}件 / 全 ${todos.length}件`
      + (saveFailed ? ' ／ ⚠ 保存できません（閉じると消えます）' : '');

    // クリック処理（チェック・削除）。data-id は文字列IDをそのまま使う
    list.querySelectorAll('.chk').forEach(c => c.addEventListener('click', () => toggle(c.dataset.id)));
    list.querySelectorAll('.del').forEach(b => b.addEventListener('click', () => remove(b.dataset.id)));
  }

  // ---- イベント ----
  el('addBtn').addEventListener('click', () => { addTodo(el('input').value); el('input').value = ''; el('input').focus(); });
  el('input').addEventListener('keydown', e => { if (e.key === 'Enter') { addTodo(el('input').value); el('input').value = ''; } });

  document.querySelectorAll('.filters button[data-filter]').forEach(b => {
    b.addEventListener('click', () => {
      filter = b.dataset.filter;
      document.querySelectorAll('.filters button[data-filter]').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });

  el('clearDone').addEventListener('click', clearDone);

  render();
</script>
</body>
</html>
