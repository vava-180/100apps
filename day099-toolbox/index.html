<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 099 まとめツール（便利ツール集）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background: #f3f4f6; color: #111827; margin: 0; padding: 20px;
      display: flex; justify-content: center;
    }
    .app { background: #fff; width: 100%; max-width: 560px; border-radius: 16px;
           box-shadow: 0 8px 24px rgba(0,0,0,.08); overflow: hidden; }
    header { background: linear-gradient(135deg,#4f46e5,#0e7490); color:#fff; padding: 20px; }
    header h1 { margin: 0; font-size: 1.3rem; }
    header p { margin: 4px 0 0; font-size: .85rem; opacity: .95; }

    /* タブ（切り替えボタン） */
    .tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 12px 12px 0; background: #f9fafb; }
    .tabs button {
      flex: 1; min-width: 88px; cursor: pointer; border: none; background: #e5e7eb;
      color: #374151; padding: 9px 8px; border-radius: 8px 8px 0 0; font-size: .85rem; font-weight: 600;
    }
    .tabs button.active { background: #fff; color: #4f46e5; }

    .panel { display: none; padding: 22px; }
    .panel.active { display: block; }
    .panel h2 { font-size: 1.05rem; margin: 0 0 14px; color: #4f46e5; }

    label { display: block; font-size: .85rem; color: #374151; margin: 12px 0 5px; }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%; padding: 10px 12px; font-size: 1rem; border: 1px solid #d1d5db; border-radius: 8px;
    }
    textarea { height: 120px; resize: vertical; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    button.act {
      margin-top: 14px; cursor: pointer; border: none; border-radius: 8px; padding: 10px 16px;
      font-size: 1rem; font-weight: 600; color: #fff; background: #4f46e5; width: 100%;
    }
    button.act:hover { opacity: .92; }
    .result {
      margin-top: 14px; padding: 14px; background: #f9fafb; border-radius: 8px;
      font-size: 1rem; min-height: 1.4em; word-break: break-all;
    }
    .result strong { color: #4f46e5; font-size: 1.25rem; }
    .checks { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 8px; }
    .checks label { display: flex; align-items: center; gap: 6px; margin: 0; }
    .checks input { width: auto; }
    .swatch { height: 64px; border-radius: 8px; border: 1px solid #e5e7eb; margin-top: 12px; }
    .stat-line { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; }
    .footer { text-align: center; color: #9ca3af; font-size: .8rem; padding: 16px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🧰 まとめツール</h1>
      <p>人気のブラウザツールを1つに合体（オフラインで動きます）</p>
    </header>

    <!-- タブの見出し -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="count">文字数</button>
      <button class="tab-btn" data-tab="warikan">割り勘</button>
      <button class="tab-btn" data-tab="pass">パスワード</button>
      <button class="tab-btn" data-tab="unit">単位変換</button>
      <button class="tab-btn" data-tab="color">カラー</button>
    </div>

    <!-- 1) 文字数カウント -->
    <section class="panel active" id="count">
      <h2>文字数カウント</h2>
      <textarea id="countText" placeholder="ここに文章を入力"></textarea>
      <div class="result">
        <div class="stat-line"><span>文字数</span><span id="cAll">0</span></div>
        <div class="stat-line"><span>空白を除く文字数</span><span id="cNoSpace">0</span></div>
        <div class="stat-line"><span>行数</span><span id="cLines">0</span></div>
      </div>
    </section>

    <!-- 2) 割り勘 -->
    <section class="panel" id="warikan">
      <h2>割り勘</h2>
      <label for="wTotal">合計金額（円）</label>
      <input type="number" id="wTotal" min="0" step="1" placeholder="例: 13000">
      <label for="wPeople">人数</label>
      <input type="number" id="wPeople" min="1" step="1" placeholder="例: 4">
      <button class="act" id="wBtn">計算する</button>
      <div class="result" id="wResult">1人あたりの金額を計算します。</div>
    </section>

    <!-- 3) パスワード生成 -->
    <section class="panel" id="pass">
      <h2>パスワード生成</h2>
      <label for="pLen">長さ（4〜64）</label>
      <input type="number" id="pLen" min="4" max="64" step="1" value="12">
      <div class="checks">
        <label><input type="checkbox" id="pLower" checked> 小文字</label>
        <label><input type="checkbox" id="pUpper" checked> 大文字</label>
        <label><input type="checkbox" id="pNum" checked> 数字</label>
        <label><input type="checkbox" id="pSym"> 記号</label>
      </div>
      <button class="act" id="pBtn">生成する</button>
      <div class="result" id="pResult">条件を選んで生成してください。</div>
    </section>

    <!-- 4) 単位変換（長さ） -->
    <section class="panel" id="unit">
      <h2>単位変換（長さ）</h2>
      <label for="uValue">数値</label>
      <input type="number" id="uValue" step="any" placeholder="例: 100">
      <div class="row">
        <div>
          <label for="uFrom">変換前</label>
          <select id="uFrom"></select>
        </div>
        <div>
          <label for="uTo">変換後</label>
          <select id="uTo"></select>
        </div>
      </div>
      <button class="act" id="uBtn">変換する</button>
      <div class="result" id="uResult">長さの単位を変換します。</div>
    </section>

    <!-- 5) カラーコード -->
    <section class="panel" id="color">
      <h2>カラーコード（RGB → HEX）</h2>
      <label for="rR">赤 R: <span id="rRv">79</span></label>
      <input type="range" id="rR" min="0" max="255" value="79">
      <label for="rG">緑 G: <span id="rGv">70</span></label>
      <input type="range" id="rG" min="0" max="255" value="70">
      <label for="rB">青 B: <span id="rBv">229</span></label>
      <input type="range" id="rB" min="0" max="255" value="229">
      <div class="swatch" id="swatch"></div>
      <div class="result" id="colorResult"></div>
    </section>

    <p class="footer">100日100アプリチャレンジ Day 099 / 100</p>
  </div>

  <script>
    // ===== 共通：タブの切り替え =====
    const tabBtns = document.querySelectorAll(".tab-btn");
    const panels = document.querySelectorAll(".panel");
    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const panel = document.getElementById(btn.dataset.tab);
        if (!panel) return; // 対応するパネルが無ければ何もしない（改名ミス対策）
        tabBtns.forEach(b => b.classList.remove("active"));
        panels.forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        panel.classList.add("active");
      });
    });

    // ===== 1) 文字数カウント =====
    // Intl.Segmenter があれば「見た目の1文字（書記素）」単位で数える。
    // これだと 👨‍👩‍👧‍👦 のような合成絵文字も1文字として数えられる（無ければコードポイント数）
    const segmenter = "Segmenter" in Intl
      ? new Intl.Segmenter("ja", { granularity: "grapheme" })
      : null;
    function countChars(s) {
      return segmenter ? [...segmenter.segment(s)].length : [...s].length;
    }
    const countText = document.getElementById("countText");
    countText.addEventListener("input", () => {
      const text = countText.value;
      const all = countChars(text);
      const noSpace = countChars(text.replace(/\s/g, ""));
      // 空のときは0行、文字があれば改行数+1
      const lines = text === "" ? 0 : text.split("\n").length;
      document.getElementById("cAll").textContent = all.toLocaleString();
      document.getElementById("cNoSpace").textContent = noSpace.toLocaleString();
      document.getElementById("cLines").textContent = lines.toLocaleString();
    });

    // ===== 2) 割り勘 =====
    document.getElementById("wBtn").addEventListener("click", () => {
      const totalRaw = document.getElementById("wTotal").value.trim();
      const total = Number(totalRaw);
      const people = Number(document.getElementById("wPeople").value);
      const out = document.getElementById("wResult");
      // Number("") は 0 になってしまうので、空欄チェックを先に入れる。円なので整数のみ
      if (totalRaw === "" || !Number.isInteger(total) || total < 0) { out.textContent = "合計金額は0以上の整数で入力してください。"; return; }
      if (!Number.isInteger(people) || people < 1) { out.textContent = "人数は1以上の整数で入力してください。"; return; }
      // 1人あたりは切り上げ。集めすぎた差額（おつり）も表示する
      const each = Math.ceil(total / people);
      const diff = each * people - total;
      out.innerHTML = `1人あたり <strong>${each.toLocaleString()}</strong> 円` +
        (diff > 0 ? `<br><small>（${people}人で集めると ${diff.toLocaleString()} 円 多くなります）</small>` : "");
    });

    // ===== 3) パスワード生成 =====
    document.getElementById("pBtn").addEventListener("click", () => {
      const len = Number(document.getElementById("pLen").value);
      const out = document.getElementById("pResult");
      if (!Number.isInteger(len) || len < 4 || len > 64) { out.textContent = "長さは4〜64の整数で入力してください。"; return; }
      // 選ばれた文字の種類を集める
      let pool = "";
      if (document.getElementById("pLower").checked) pool += "abcdefghijklmnopqrstuvwxyz";
      if (document.getElementById("pUpper").checked) pool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (document.getElementById("pNum").checked)   pool += "0123456789";
      if (document.getElementById("pSym").checked)   pool += "!@#$%^&*-_=+?";
      if (pool === "") { out.textContent = "文字の種類を1つ以上選んでください。"; return; }
      // 暗号的に安全な乱数（crypto）で、偏りなく1文字選ぶ（剰余の偏りを除く=棄却サンプリング）
      const pickIndex = (max) => {
        const limit = Math.floor(0x100000000 / max) * max; // この値以上は捨てて引き直す
        const buf = new Uint32Array(1);
        do { crypto.getRandomValues(buf); } while (buf[0] >= limit);
        return buf[0] % max;
      };
      let pw = "";
      for (let i = 0; i < len; i++) pw += pool[pickIndex(pool.length)];
      out.innerHTML = `<strong style="font-size:1.05rem">${pw}</strong>`;
    });

    // ===== 4) 単位変換（長さ）=====
    // 基準をメートルにして、各単位が「何メートルか」を持つ
    const UNITS = { "mm": 0.001, "cm": 0.01, "m": 1, "km": 1000, "inch": 0.0254, "feet": 0.3048 };
    const uFrom = document.getElementById("uFrom");
    const uTo = document.getElementById("uTo");
    for (const name of Object.keys(UNITS)) {
      uFrom.add(new Option(name, name));
      uTo.add(new Option(name, name));
    }
    uFrom.value = "m"; uTo.value = "cm";
    document.getElementById("uBtn").addEventListener("click", () => {
      const raw = document.getElementById("uValue").value.trim();
      const value = Number(raw);
      const out = document.getElementById("uResult");
      // Number("") は 0 なので、空欄を先に弾く
      if (raw === "" || !Number.isFinite(value)) { out.textContent = "数値を入力してください。"; return; }
      // 変換前→メートル→変換後 の順で計算する
      const meters = value * UNITS[uFrom.value];
      const result = meters / UNITS[uTo.value];
      out.innerHTML = `${value} ${uFrom.value} = <strong>${Number(result.toPrecision(10))}</strong> ${uTo.value}`;
    });

    // ===== 5) カラーコード =====
    const rR = document.getElementById("rR"), rG = document.getElementById("rG"), rB = document.getElementById("rB");
    // 0〜255に丸めてから2桁の16進数にする（範囲外や小数が来ても壊れない）
    function two(n) {
      const v = Math.min(255, Math.max(0, Math.round(n)));
      return v.toString(16).padStart(2, "0");
    }
    function updateColor() {
      const r = Number(rR.value), g = Number(rG.value), b = Number(rB.value);
      document.getElementById("rRv").textContent = r;
      document.getElementById("rGv").textContent = g;
      document.getElementById("rBv").textContent = b;
      const hex = "#" + two(r) + two(g) + two(b);
      document.getElementById("swatch").style.background = hex;
      document.getElementById("colorResult").innerHTML =
        `HEX: <strong>${hex.toUpperCase()}</strong>　/　RGB: ${r}, ${g}, ${b}`;
    }
    [rR, rG, rB].forEach(s => s.addEventListener("input", updateColor));
    updateColor(); // 最初に1回表示
  </script>
</body>
</html>
