<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簡易見積書ジェネレータ</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #2c3038;
    --sub: #7a8290;
    --accent: #4f7cff;
    --border: #e3e6eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
      "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 800px; margin: 0 auto; padding: 40px 20px 60px; }
  h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 4px; }
  .lead { color: var(--sub); font-size: 0.9rem; margin: 0 0 24px; }
  .sheet { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
  .head-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 22px; margin-bottom: 20px; }
  label { display: block; font-size: 0.75rem; color: var(--sub); margin-bottom: 4px; }
  input[type="text"], input[type="date"], input[type="number"] {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.95rem; font-family: inherit; color: var(--text); outline: none; background: #fff;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,124,255,.15); }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th, td { padding: 8px 8px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  th { text-align: left; color: var(--sub); font-size: 0.75rem; font-weight: 600; }
  td.num, th.num { text-align: right; }
  .items input { border: 1px solid transparent; background: #fafbfd; }
  .items input:focus { border-color: var(--accent); background: #fff; }
  td .del { border: none; background: none; color: #c45; cursor: pointer; font-size: 1.1rem; line-height: 1; }
  .add { margin-top: 12px; border: 1px dashed var(--border); background: #fafbfd; color: var(--accent);
    border-radius: 8px; padding: 9px 16px; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
  .add:hover { background: #eef2ff; }
  .totals { margin-top: 20px; margin-left: auto; width: 280px; font-size: 0.95rem; }
  .totals .line { display: flex; justify-content: space-between; padding: 6px 0; }
  .totals .grand { border-top: 2px solid var(--text); margin-top: 6px; padding-top: 10px; font-size: 1.25rem; font-weight: 700; }
  .tax-row { display: flex; align-items: center; gap: 8px; justify-content: flex-end; margin-top: 6px; font-size: 0.8rem; color: var(--sub); }
  .tax-row input { width: 60px; }
  .bar { display: flex; gap: 12px; margin: 18px 0 0; }
  .primary { border: none; background: var(--accent); color: #fff; border-radius: 10px; padding: 12px 22px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .ghost { border: none; background: #eceef2; color: var(--text); border-radius: 10px; padding: 12px 18px; cursor: pointer; font-family: inherit; }
  button:hover { opacity: .92; }
  .num-strong { font-variant-numeric: tabular-nums; }
  footer { margin-top: 22px; text-align: center; color: var(--sub); font-size: 0.8rem; }

  /* 印刷時は入力欄を線なしにして、紙の見積書らしく出す */
  @media print {
    body { background: #fff; }
    .lead, .bar, .add, .del, footer { display: none !important; }
    .sheet { border: none; padding: 0; }
    .items input, input { border: none !important; background: #fff !important; box-shadow: none !important; }
    th, td { border-bottom: 1px solid #999; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>簡易見積書ジェネレータ</h1>
    <p class="lead">項目と金額を入れるだけで合計・消費税を自動計算。そのまま印刷してPDF保存もできます。</p>

    <div class="sheet">
      <div class="head-grid">
        <div>
          <label>宛先（会社名・お客様名）</label>
          <input type="text" id="client" placeholder="例）株式会社サンプル 御中">
        </div>
        <div>
          <label>件名</label>
          <input type="text" id="subject" placeholder="例）Webサイト制作一式">
        </div>
        <div>
          <label>発行日</label>
          <input type="date" id="issueDate">
        </div>
        <div>
          <label>自社名・担当</label>
          <input type="text" id="from" placeholder="例）山田商店 山田太郎">
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th style="width:46%">品目・内容</th>
            <th class="num" style="width:16%">単価</th>
            <th class="num" style="width:14%">数量</th>
            <th class="num" style="width:20%">金額</th>
            <th style="width:4%"></th>
          </tr>
        </thead>
        <tbody id="itemBody"></tbody>
      </table>
      <button class="add" id="addRow">＋ 行を追加</button>

      <div class="totals">
        <div class="line"><span>小計</span><span class="num-strong" id="subtotal">¥0</span></div>
        <div class="line"><span>消費税</span><span class="num-strong" id="tax">¥0</span></div>
        <div class="tax-row">税率 <input type="number" id="taxRate" value="10" min="0" max="100"> ％</div>
        <div class="line grand"><span>合計</span><span class="num-strong" id="grand">¥0</span></div>
      </div>

      <div class="bar">
        <button class="primary" id="print">🖨 印刷 / PDF保存</button>
        <button class="ghost" id="reset">リセット</button>
      </div>
    </div>

    <footer>Day 8 / 100 — Estimate Generator</footer>
  </div>

<script>
  const itemBody = document.getElementById('itemBody');
  const taxRate = document.getElementById('taxRate');

  // 1行（品目・単価・数量・金額・削除）を作って表に追加する
  function addRow(name = '', price = '', qty = '') {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" class="name" placeholder="品目名" value="${name}"></td>
      <td class="num"><input type="number" class="price" placeholder="0" value="${price}"></td>
      <td class="num"><input type="number" class="qty" placeholder="0" value="${qty}"></td>
      <td class="num amount num-strong">¥0</td>
      <td><button class="del" title="削除">×</button></td>`;
    itemBody.appendChild(tr);
    // 入力されたら再計算、削除ボタンで行を消す
    tr.querySelectorAll('input').forEach(inp => inp.addEventListener('input', calc));
    tr.querySelector('.del').addEventListener('click', () => { tr.remove(); calc(); });
    calc();
  }

  // 金額を「¥1,234」の形にする
  function yen(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }

  // すべての行を計算して小計・消費税・合計を更新する
  function calc() {
    let subtotal = 0;
    itemBody.querySelectorAll('tr').forEach(tr => {
      const price = parseFloat(tr.querySelector('.price').value) || 0;
      const qty = parseFloat(tr.querySelector('.qty').value) || 0;
      const amount = price * qty;
      tr.querySelector('.amount').textContent = yen(amount);
      subtotal += amount;
    });
    const rate = parseFloat(taxRate.value) || 0;
    const tax = subtotal * rate / 100;
    document.getElementById('subtotal').textContent = yen(subtotal);
    document.getElementById('tax').textContent = yen(tax);
    document.getElementById('grand').textContent = yen(subtotal + tax);
  }

  document.getElementById('addRow').addEventListener('click', () => addRow());
  taxRate.addEventListener('input', calc);
  document.getElementById('print').addEventListener('click', () => window.print());
  document.getElementById('reset').addEventListener('click', () => {
    if (!confirm('入力内容をすべて消してよいですか？')) return;
    itemBody.innerHTML = '';
    addRow(); addRow(); addRow();
    document.getElementById('client').value = '';
    document.getElementById('subject').value = '';
    document.getElementById('from').value = '';
  });

  // 初期状態：今日の日付＋空の行を3つ用意する
  const t = new Date();
  document.getElementById('issueDate').value = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  addRow(); addRow(); addRow();
</script>
</body>
</html>
